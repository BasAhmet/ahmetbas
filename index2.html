<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmet Baş | Matematik Öğretmeni</title>
    <!-- Tailwind CSS ve FontAwesome İkonları -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- LATEX / MATHJAX MATEMATİKSEL BİÇİMLENDİRME ENTEGRASYONU -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body[data-theme="light"] { --bg-body: #f8fafc; --bg-card: #ffffff; --text-title: #0f172a; --text-body: #334155; --text-muted: #64748b; --border-ui: #e2e8f0; --accent-soft: #eff6ff; --accent-color: #2563eb; --btn-accent: #2563eb; --header-bg: rgba(255, 255, 255, 0.85); }
        body[data-theme="dark"] { --bg-body: #0f172a; --bg-card: #1e293b; --text-title: #f8fafc; --text-body: #cbd5e1; --text-muted: #94a3b8; --border-ui: #334155; --accent-soft: #1e1b4b; --accent-color: #818cf8; --btn-accent: #6366f1; --header-bg: rgba(30, 41, 59, 0.85); }
        body { background-color: var(--bg-body); color: var(--text-body); transition: background-color 0.3s ease, color 0.3s ease; }
        .theme-header { background-color: var(--header-bg); border-color: var(--border-ui); }
        .theme-card { background-color: var(--bg-card); border-color: var(--border-ui); }
        .theme-text-title { color: var(--text-title); }
        .theme-text-body { color: var(--text-body); }
        .theme-text-muted { color: var(--text-muted); }
        .theme-border { border-color: var(--border-ui); }
        .theme-accent-soft { background-color: var(--accent-soft); }
        .theme-accent-text { color: var(--accent-color); }
        .theme-btn-accent { background-color: var(--btn-accent); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .sub-content { display: none; }
        .sub-content.active { display: block; }
    </style>
</head>
<body data-theme="light" class="min-h-screen flex flex-col justify-between antialiased">

    <!-- ÜST MENÜ -->
    <header class="border-b theme-header backdrop-blur sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="font-bold text-lg theme-text-title"><i class="fas fa-calculator theme-accent-text mr-2"></i>Ahmet Baş</div>
            <div class="flex items-center space-x-3">
                <nav class="flex space-x-1">
                    <button onclick="switchTab('home')" id="tab-btn-home" class="px-3 py-1.5 rounded-xl text-sm font-semibold theme-accent-text theme-accent-soft">Ana Sayfa</button>
                    <button onclick="switchTab('materials')" id="tab-btn-materials" class="px-3 py-1.5 rounded-xl text-sm font-semibold theme-text-muted">Ders Materyalleri</button>
                </nav>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12 flex-grow w-full">
        <div id="tab-home" class="tab-content active space-y-12">
            
            <!-- Profil -->
            <div class="text-center">
                <h1 class="text-4xl font-extrabold theme-text-title mb-2">Ahmet Baş</h1>
                <h2 class="text-xl font-bold theme-accent-text mb-4">Matematik Öğretmeni</h2>
            </div>

            <!-- HAFTANIN SORUSU - GÜNCELLENMİŞ -->
            <div class="theme-card border rounded-2xl p-6 shadow-sm">
                <div class="flex items-center space-x-3 mb-4">
                    <span class="text-xl">🧠</span>
                    <h3 class="text-lg font-bold theme-text-title">Haftanın Matematik Bulmacası</h3>
                </div>
                
                <!-- SORU KUTUSU -->
                <div id="bulmaca-soru" class="theme-text-body text-sm leading-relaxed font-medium bg-slate-500/5 p-4 rounded-xl border theme-border mb-4">
                    Yükleniyor...
                </div>
                
                <!-- İPUCU KUTUSU (Görselde görünen yapı) -->
                <div id="bulmaca-ipucu" class="text-sm font-semibold theme-accent-text p-3 rounded-xl border-l-4 border-blue-500 bg-blue-50/50">
                    Yükleniyor...
                </div>
            </div>

            <!-- Diğer Kartlar vs. buraya gelecek (kodun devamı aynı kalabilir) -->
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() { loadBulmaca(); });

        function loadBulmaca() {
            fetch('bulmaca.txt')
                .then(response => response.text())
                .then(text => {
                    const lines = text.split('\n');
                    let soru = "", ipucu = "";
                    lines.forEach(line => {
                        if (line.startsWith('SORU |')) soru = line.replace('SORU |', '').trim();
                        if (line.startsWith('IPUCU |')) ipucu = line.replace('IPUCU |', '').trim();
                    });
                    document.getElementById('bulmaca-soru').innerHTML = soru;
                    document.getElementById('bulmaca-ipucu').innerHTML = `<i class="fas fa-lightbulb mr-2"></i> ${ipucu}`;
                    
                    // MathJax render
                    if(window.MathJax) MathJax.typesetPromise();
                });
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
        }
    </script>
</body>
</html>
